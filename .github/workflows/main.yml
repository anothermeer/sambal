name: Release binaries

on:
  release:
    types:
      - published

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: |
          go build -o sambal-windows-amd64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: sambal-windows-amd64.exe
          path: sambal-windows-amd64.exe

  build-linux-amd:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            libgl1-mesa-dev \
            xorg-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libegl1-mesa-dev

      - name: Build
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=1 go build -o sambal-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: sambal-linux-amd64
          path: sambal-linux-amd64

  build-linux-arm:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            libgl1-mesa-dev \
            xorg-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libegl1-mesa-dev

      - name: Build
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=1 go build -o sambal-linux-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: sambal-linux-arm64
          path: sambal-linux-arm64

  build-macos-arm:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Fyne
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Package macOS app
        #run: fyne package -os darwin -arch arm64
        run: GOOS=darwin GOARCH=arm64 fyne package

      - name: Rename output app
        run: |
          mv *.app sambal-macos-arm64.app
          zip -r sambal-macos-arm64.zip sambal-macos-arm64.app 

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: sambal-macos-arm64.zip

  build-macos-amd:
    runs-on: macos-26-intel

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Fyne
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Package macOS app
        #run: fyne package -os darwin -arch amd64
        run: GOOS=darwin GOARCH=amd64 fyne package

      - name: Rename output app
        run: |
          mv *.app sambal-macos-amd64.app
          zip -r sambal-macos-amd64.zip sambal-macos-amd64.app 

      - uses: actions/upload-artifact@v4
        with:
          name: macos-amd64
          path: sambal-macos-amd64.zip
          
  upload:
    needs: [build-windows, build-linux-amd, build-linux-arm, build-macos-amd, build-macos-arm]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.zip
            **/sambal-linux-*
            **/sambal-windows-*.exe
