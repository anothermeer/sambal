name: Release binaries

on:
  release:
    types:
      - published

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          GOOS=windows GOARCH=amd64 go build -o sambal-windows-amd64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: sambal-windows-amd64.exe
          path: sambal-windows-amd64.exe

  build-linux:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: sambal-linux-amd64

          - goos: linux
            goarch: arm64
            output: sambal-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o ${{ matrix.output }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  build-macos-arm:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Fyne
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Package macOS app
        run: fyne package -os darwin -arch arm64

      - name: Rename output app
        run: |
          mv *.app sambal-macos-arm64.app
          zip -r sambal-macos-arm64.zip sambal-macos-arm64.app 

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: sambal-macos-arm64.zip

  build-macos-amd:
    runs-on: macos-26-intel

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Fyne
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Package macOS app
        run: fyne package -os darwin -arch amd64

      - name: Rename output app
        run: |
          mv *.app sambal-macos-amd64.app
          zip -r sambal-macos-amd64.zip sambal-macos-amd64.app 

      - uses: actions/upload-artifact@v4
        with:
          name: macos-amd64
          path: sambal-macos-amd64.zip
          
  upload:
    needs: [build-windows, build-linux, build-macos-arm, build-macos-amd]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.zip
            **/sambal-linux-*
            **/sambal-windows-*.exe
